name: Update Clang Trackers

on:
  schedule:
    # Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-clang.yml"
      - ".github/scripts/update_clang.py"

permissions:
  contents: write

concurrency:
  group: update-clang
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We only ever touch tracker files, so a shallow clone is fine.
          fetch-depth: 1
          persist-credentials: true

      - name: Run updater
        id: updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # ubuntu-latest ships a recent python3, no need for actions/setup-python.
        run: python3 .github/scripts/update_clang.py

      - name: Commit and push changes
        if: steps.updater.outputs.changed == 'true'
        env:
          UPDATED: ${{ steps.updater.outputs.updated_branches }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Clang-*-commit.txt Clang-*-lastbuild.txt Clang-*-link.txt \
                  Clang-*-sha256.txt \
                  Pixel-8-*-commit.txt Pixel-8-*-lastbuild.txt \
                  Pixel-8-*-link.txt Pixel-8-*-sha256.txt \
                  Pixel-8-*-clang.txt
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi
          latest_build=$(cat Clang-*-lastbuild.txt | sort -u | tail -n1)
          git commit -m "ci: sync ZyCromerZ/Clang trackers (${latest_build})" \
                     -m "Updated branches: ${UPDATED:-unknown}"
          # Retry-on-conflict push: rebase on top of any concurrent commit.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push failed, retrying ($i)..."
            git pull --rebase --autostash
          done
          echo "::error::push failed after retries"
          exit 1
